<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>センプウェブビデオ</title>
    <style>
        body { margin: 0; background-color: #0d0e12; color: #fff; font-family: sans-serif; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px; height: 56px; background-color: #0d0e12; position: fixed; top: 0; width: 100%; box-sizing: border-box; border-bottom: 1px solid #1f2330; z-index: 100; }
        .logo-area { font-weight: 800; font-size: 18px; color: #00d2ff; cursor: pointer; }
        .search-bar { width: 40%; display: flex; }
        .search-bar input { width: 100%; padding: 0 16px; height: 36px; background-color: #161922; border: 1px solid #2a2f42; border-radius: 40px 0 0 40px; color: #fff; outline: none; }
        .search-bar button { width: 50px; background-color: #212636; border: 1px solid #2a2f42; border-left: none; border-radius: 0 40px 40px 0; color: #00d2ff; cursor: pointer; }
        .container { display: flex; max-width: 1280px; margin: 76px auto 0; padding: 0 24px; gap: 24px; }
        .main-content { flex: 2; }
        
        /* 🛠 動画エリアを「GIF画像」が綺麗に収まる箱に調整 */
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 16px; overflow: hidden; }
        .video-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        
        .video-title { font-size: 20px; font-weight: 700; margin: 16px 0 12px 0; }
        .video-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .channel-info { display: flex; align-items: center; gap: 12px; }
        .channel-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #00d2ff, #0066ff); border-radius: 50%; }
        .subscribe-btn { background-color: #00d2ff; color: #0d0e12; border: none; padding: 0 20px; height: 36px; border-radius: 18px; font-weight: bold; cursor: pointer; }
        .action-buttons { display: flex; background-color: #161922; border-radius: 20px; border: 1px solid #2a2f42; overflow: hidden; }
        .like-btn, .dislike-btn { background: none; border: none; color: #fff; padding: 0 16px; height: 36px; display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .like-btn { border-right: 1px solid #2a2f42; }
        .active-btn { background-color: rgba(0, 210, 255, 0.3) !important; color: #00d2ff !important; }
        .comment-section { border-top: 1px solid #1f2330; padding-top: 20px; }
        .comment-form { display: flex; gap: 12px; margin-bottom: 24px; }
        .user-avatar { width: 40px; height: 40px; background-color: #555; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .comment-input-area { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .comment-input-area input { background: none; border: none; border-bottom: 1px solid #2a2f42; color: #fff; padding: 8px 0; outline: none; }
        .comment-submit-btn { align-self: flex-end; background-color: #212636; color: #fff; border: none; padding: 8px 16px; border-radius: 16px; cursor: pointer; }
        .comment-submit-btn.active { background-color: #00d2ff; color: #0d0e12; }
        .comment-list { display: flex; flex-direction: column; gap: 16px; }
        .comment-item { display: flex; gap: 12px; }
        .comment-text-box h4 { margin: 0 0 4px 0; font-size: 13px; color: #8a92a6; }
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .recommend-card { display: flex; gap: 12px; cursor: pointer; padding: 8px; border-radius: 8px; }
        .recommend-card:hover { background-color: rgba(255, 255, 255, 0.05); }
        .thumbnail { width: 140px; height: 80px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 24px; flex-shrink: 0; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area" onclick="location.reload()">📺 センプウェブビデオ</div>
        <div class="search-bar">
            <input type="text" placeholder="検索"><button onclick="alert('未実装')">🔍</button>
        </div>
    </header>

    <div class="container">
        <div class="main-content">
            <!-- 🛠 タグを <video> から <img> に変更し、GIFを読み込むようにしました -->
            <div class="video-wrapper">
                <img id="mainGif" src="https://giphy.com" alt="video">
            </div>
            <h1 class="video-title" id="currentTitle">Pixel Bonfire (Cozy Animation)</h1>
            
            <div class="video-toolbar">
                <div class="channel-info">
                    <div class="channel-icon"></div>
                    <span class="channel-name">Pixel Artist</span>
                    <button class="subscribe-btn" id="subBtn" onclick="toggleSub()">チャンネル登録</button>
                </div>
                <div class="action-buttons">
                    <button class="like-btn" id="likeBtn" onclick="toggleLike()">👍 <span id="likeCount">125</span></button>
                    <button class="dislike-btn" id="dislikeBtn" onclick="toggleDislike()">👎</button>
                </div>
            </div>

            <div class="comment-section">
                <h2>コメント <span id="commentCount">2</span> 件</h2>
                <div class="comment-form">
                    <div class="user-avatar">👤</div>
                    <div class="comment-input-area">
                        <input type="text" id="commentInput" placeholder="コメントを追加..." oninput="checkInput()">
                        <button class="comment-submit-btn" id="submitBtn" onclick="addComment()">投稿</button>
                    </div>
                </div>
                <div class="comment-list" id="commentList">
                    <div class="comment-item"><div class="user-avatar">🐱</div><div class="comment-text-box"><h4>@music_lover</h4><p>ドット絵の焚き火、めっちゃ癒やされますね🔥</p></div></div>
                    <div class="comment-item"><div class="user-avatar">🦊</div><div class="comment-text-box"><h4>@web_dev_kun</h4><p>GIFリライト作戦大成功！これなら絶対動く！</p></div></div>
                </div>
            </div>
        </div>

        <!-- 🛠 右側リストを押した時も別のGIFに切り替わるように設定 -->
        <div class="sidebar">
            <div class="recommend-card" onclick="changeGif('https://giphy.com', 'Pixel Bonfire (Cozy Animation)')">
                <div class="thumbnail" style="background: linear-gradient(135deg, #00d2ff, #0066ff);">🔥</div>
                <div class="rec-info"><h3>Pixel Bonfire</h3><p>Pixel Artist</p></div>
            </div>
            <div class="recommend-card" onclick="changeGif('https://giphy.com', 'Space Cat Rocket (Retro Anime)')">
                <div class="thumbnail" style="background: linear-gradient(135deg, #ff416c, #ff4b2b);">🐱</div>
                <div class="rec-info"><h3>Space Cat Rocket</h3><p>Retro Anime</p></div>
            </div>
        </div>
    </div>

    <script>
        const gifView = document.getElementById('mainGif'), currentTitle = document.getElementById('currentTitle'), subBtn = document.getElementById('subBtn');
        let likes = 125, isLiked = false, isDisliked = false;

        // 🛠 GIFを切り替える処理
        function changeGif(url, title) { 
            gifView.src = url; 
            currentTitle.innerText = title; 
        }
        
        function toggleSub() { const isSub = subBtn.innerText === "チャンネル登録"; subBtn.innerText = isSub ? "登録済み" : "チャンネル登録"; subBtn.style.backgroundColor = isSub ? "#212636" : "#00d2ff"; subBtn.style.color = isSub ? "#fff" : "#0d0e12"; }
        function toggleLike() { const btn = document.getElementById('likeBtn'), count = document.getElementById('likeCount'); if (!isLiked) { likes++; btn.classList.add('active-btn'); isLiked = true; if(isDisliked) toggleDislike(); } else { likes--; btn.classList.remove('active-btn'); isLiked = false; } count.innerText = likes; }
        function toggleDislike() { const btn = document.getElementById('dislikeBtn'); if (!isDisliked) { btn.classList.add('active-btn'); isDisliked = true; if(isLiked) toggleLike(); } else { btn.classList.remove('active-btn'); isDisliked = false; } }
        function checkInput() { const input = document.getElementById('commentInput'), btn = document.getElementById('submitBtn'); btn.classList.toggle('active', input.value.trim() !== ""); }
        function addComment() { const input = document.getElementById('commentInput'), list = document.getElementById('commentList'), countEl = document.getElementById('commentCount'); if (!input.value.trim()) return; const newItem = document.createElement('div'); newItem.className = 'comment-item'; newItem.innerHTML = `<div class="user-avatar" style="background:#00d2ff;color:#0d0e12">You</div><div class="comment-text-box"><h4>@ゲスト</h4><p>${input.value}</p></div>`; list.insertBefore(newItem, list.firstChild); countEl.innerText = parseInt(countEl.innerText) + 1; input.value = ""; checkInput(); }
    </script>
</body>
</html>
