<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>センプウェブビデオ</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #0d0e12; color: #fff; font-family: sans-serif; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px; height: 56px; background-color: #0d0e12; position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 100; border-bottom: 1px solid #1f2330; }
        .logo-area { display: flex; align-items: center; font-weight: 800; font-size: 18px; gap: 6px; cursor: pointer; }
        .logo-icon { color: #00d2ff; font-size: 28px !important; }
        .search-bar { width: 40%; max-width: 600px; display: flex; }
        .search-bar input { width: 100%; padding: 0 16px; height: 38px; background-color: #161922; border: 1px solid #2a2f42; border-radius: 40px 0 0 40px; color: white; outline: none; }
        .search-bar button { width: 64px; height: 38px; background-color: #212636; border: 1px solid #2a2f42; border-left: none; border-radius: 0 40px 40px 0; color: #00d2ff; cursor: pointer; }
        .container { display: flex; max-width: 1280px; margin: 76px auto 0; padding: 0 24px; gap: 24px; }
        .main-content { flex: 2; }
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 16px; overflow: hidden; }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .video-title { font-size: 22px; font-weight: 700; margin: 16px 0 12px 0; }
        .video-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .channel-info { display: flex; align-items: center; gap: 12px; }
        .channel-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #00d2ff, #0066ff); border-radius: 50%; }
        .subscribe-btn { background-color: #00d2ff; color: #0d0e12; border: none; padding: 0 20px; height: 36px; border-radius: 18px; font-weight: bold; cursor: pointer; }
        .action-buttons { display: flex; background-color: #161922; border-radius: 20px; overflow: hidden; border: 1px solid #2a2f42; }
        .like-btn, .dislike-btn { background: none; border: none; color: white; padding: 0 16px; height: 36px; display: flex; align-items: center; gap: 6px; font-weight: bold; cursor: pointer; }
        .like-btn { border-right: 1px solid #2a2f42; }
        .active-blue { color: #00d2ff !important; }
        .comment-section { border-top: 1px solid #1f2330; padding-top: 20px; }
        .comment-form { display: flex; gap: 12px; margin-bottom: 24px; }
        .user-avatar { width: 40px; height: 40px; background-color: #555; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .comment-input-area { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .comment-input-area input { background: none; border: none; border-bottom: 1px solid #2a2f42; color: white; padding: 8px 0; outline: none; width: 100%; }
        .comment-submit-btn { align-self: flex-end; background-color: #212636; color: white; border: none; padding: 8px 16px; border-radius: 16px; cursor: pointer; }
        .comment-submit-btn.active { background-color: #00d2ff; color: #0d0e12; }
        .comment-list { display: flex; flex-direction: column; gap: 16px; }
        .comment-item { display: flex; gap: 12px; }
        .comment-text-box h4 { margin: 0 0 4px 0; font-size: 13px; color: #8a92a6; }
        .comment-text-box p { margin: 0; font-size: 15px; }
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .recommend-card { display: flex; gap: 12px; cursor: pointer; padding: 4px; border-radius: 8px; }
        .recommend-card:hover { background-color: rgba(255, 255, 255, 0.05); }
        .thumbnail { width: 168px; height: 94px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 24px; flex-shrink: 0; }
        .rec-info h3 { font-size: 14px; margin: 0 0 4px 0; }
        .rec-info p { font-size: 12px; color: #8a92a6; margin: 0; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area" onclick="location.reload()"><span class="material-icons-round logo-icon">live_tv</span>センプウェブビデオ</div>
        <div class="search-bar">
            <input type="text" placeholder="検索"><button onclick="alert('未実装')"><span class="material-icons-round">search</span></button>
        </div>
    </header>

    <div class="container">
        <div class="main-content">
            <div class="video-wrapper">
                <video id="mainVideo" controls autoplay muted src="https://googleapis.com"></video>
            </div>
            <h1 class="video-title" id="currentTitle">Leisurely grassland (Official Video)</h1>
            
            <div class="video-toolbar">
                <div class="channel-info">
                    <div class="channel-icon"></div>
                    <span class="channel-name">Acoustic Breeze</span>
                    <button class="subscribe-btn" id="subBtn" onclick="toggleSub()">チャンネル登録</button>
                </div>
                <div class="action-buttons">
                    <button class="like-btn" onclick="toggleLike()"><span class="material-icons-round" id="likeIcon">thumb_up_off_alt</span><span id="likeCount">125</span></button>
                    <button class="dislike-btn" onclick="toggleDislike()"><span class="material-icons-round" id="dislikeIcon">thumb_down_off_alt</span></button>
                </div>
            </div>

            <div class="comment-section">
                <h2>コメント <span id="commentCount">2</span> 件</h2>
                <div class="comment-form">
                    <div class="user-avatar">👤</div>
                    <div class="comment-input-area">
                        <input type="text" id="commentInput" placeholder="コメントを追加..." oninput="checkInput()">
                        <button class="comment-submit-btn" id="submitBtn" onclick="addComment()">投稿</button>
                    </div>
                </div>
                <div class="comment-list" id="commentList">
                    <div class="comment-item"><div class="user-avatar">🐱</div><div class="comment-text-box"><h4>@music_lover</h4><p>癒やされます！🌿</p></div></div>
                    <div class="comment-item"><div class="user-avatar"> Foxes🦊</div><div class="comment-text-box"><h4>@web_dev_kun</h4><p>UIカッコいいな！</p></div></div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="recommend-card" onclick="changeVideo('bgm.mp3', 'Leisurely grassland (Official Video)')">
                <div class="thumbnail" style="background: linear-gradient(135deg, #00d2ff, #0066ff);">🌿</div>
                <div class="rec-info"><h3>Leisurely grassland</h3><p>Acoustic Breeze</p></div>
            </div>
            <div class="recommend-card" onclick="changeVideo('https://googleapis.com', 'Big Buck Bunny')">
                <div class="thumbnail" style="background: linear-gradient(135deg, #ff416c, #ff4b2b);">🐰</div>
                <div class="rec-info"><h3>Big Buck Bunny</h3><p>Blender Foundation</p></div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVideo'), currentTitle = document.getElementById('currentTitle'), subBtn = document.getElementById('subBtn');
        let likes = 125, isLiked = false, isDisliked = false;

        function changeVideo(src, title) { video.src = src; currentTitle.innerText = title; video.play(); }
        function toggleSub() { const isSub = subBtn.innerText === "チャンネル登録"; subBtn.innerText = isSub ? "登録済み" : "チャンネル登録"; subBtn.style.backgroundColor = isSub ? "#212636" : "#00d2ff"; subBtn.style.color = isSub ? "#fff" : "#0d0e12"; }
        function toggleLike() { const icon = document.getElementById('likeIcon'), count = document.getElementById('likeCount'); if (!isLiked) { likes++; icon.innerText = "thumb_up"; icon.classList.add('active-blue'); isLiked = true; if(isDisliked) toggleDislike(); } else { likes--; icon.innerText = "thumb_up_off_alt"; icon.classList.remove('active-blue'); isLiked = false; } count.innerText = likes; }
        function toggleDislike() { const icon = document.getElementById('dislikeIcon'); if (!isDisliked) { icon.innerText = "thumb_down"; icon.classList.add('active-blue'); isDisliked = true; if(isLiked) toggleLike(); } else { icon.innerText = "thumb_down_off_alt"; icon.classList.remove('active-blue'); isDisliked = false; } }
        function checkInput() { const input = document.getElementById('commentInput'), btn = document.getElementById('submitBtn'); btn.classList.toggle('active', input.value.trim() !== ""); }
        function addComment() { const input = document.getElementById('commentInput'), list = document.getElementById('commentList'), countEl = document.getElementById('commentCount'); if (!input.value.trim()) return; const newItem = document.createElement('div'); newItem.className = 'comment-item'; newItem.innerHTML = `<div class="user-avatar" style="background:#00d2ff;color:#0d0e12">You</div><div class="comment-text-box"><h4>@ゲスト</h4><p>${input.value}</p></div>`; list.insertBefore(newItem, list.firstChild); countEl.innerText = parseInt(countEl.innerText) + 1; input.value = ""; checkInput(); }
    </script>
</body>
</html>
